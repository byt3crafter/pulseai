version: "3.8"

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: pulse-postgres
    environment:
      POSTGRES_DB: pulse
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pulse-network

  # Redis for queue and rate limiting
  redis:
    image: redis:7-alpine
    container_name: pulse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pulse-network

  # Pulse AI backend
  pulse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pulse-backend
    env_file:
      - .env
    environment:
      # Override with container network URLs
      DATABASE_URL: postgres://pulse:pulse_dev_password@postgres:5432/pulse
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pulse-network
    volumes:
      # Mount migrations for schema updates
      - ./src/storage/migrations:/app/dist/storage/migrations:ro

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  pulse-network:
    driver: bridge
