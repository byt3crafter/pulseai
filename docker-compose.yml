services:
  # -----------------------------------------------------------------
  # Postgres Database (Persistence)
  # -----------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:0.8.0-pg15
    container_name: pulse-postgres
    restart: always
    environment:
      POSTGRES_USER: pulseadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pulse
    volumes:
      - pulse-db-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pulseadmin -d pulse" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------
  # Redis (Rate Limiting, Job Queue via BullMQ)
  # -----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pulse-redis
    restart: always
    expose:
      - "6379"
    volumes:
      - pulse-redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------
  # Fastify Gateway Service (API, Webhooks, Websockets)
  # -----------------------------------------------------------------
  pulse-gateway:
    build:
      context: .
      dockerfile: ./pulse/Dockerfile
    container_name: pulse-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=8080
      - DATABASE_URL=postgres://pulseadmin:${POSTGRES_PASSWORD}@postgres:5432/pulse
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - WORKSPACE_BASE_DIR=/app/data/workspaces
    volumes:
      - pulse-workspace-data:/app/data/workspaces

  # -----------------------------------------------------------------
  # Next.js Dashboard (Frontend Admin Panel)
  # NOTE: NEXTAUTH_URL must be changed for production (e.g. https://yourdomain.com)
  # -----------------------------------------------------------------
  pulse-dashboard:
    build:
      context: .
      dockerfile: ./dashboard/Dockerfile
    container_name: pulse-dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://pulseadmin:${POSTGRES_PASSWORD}@postgres:5432/pulse
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - WORKSPACE_BASE_DIR=/app/data/workspaces
    volumes:
      - pulse-workspace-data:/app/data/workspaces

  # -----------------------------------------------------------------
  # Python Sandbox Image (Agent Code Execution)
  # -----------------------------------------------------------------
  python-sandbox:
    build:
      context: ./pulse/docker/python-sandbox
      dockerfile: Dockerfile
    image: pulse-python-sandbox:latest
    profiles:
      - build-only

volumes:
  pulse-db-data:
  pulse-redis-data:
  pulse-workspace-data:
