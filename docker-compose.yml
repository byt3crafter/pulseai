version: '3.8'

services:
  # -----------------------------------------------------------------
  # Postgres Database (Persistence)
  # -----------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: pulse-postgres
    restart: always
    environment:
      POSTGRES_USER: pulseadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_pulse_db_password}
      POSTGRES_DB: pulse
    volumes:
      - pulse-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pulseadmin -d pulse" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------
  # Redis (Rate Limiting, Job Queue via BullMQ)
  # -----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pulse-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - pulse-redis-data:/data
    command: redis-server --appendonly yes Make
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------
  # Fastify Gateway Service (API, Webhooks, Websockets)
  # -----------------------------------------------------------------
  pulse-gateway:
    build:
      context: .
      dockerfile: ./pulse/Dockerfile
    container_name: pulse-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=8080
      - DATABASE_URL=postgres://pulseadmin:${POSTGRES_PASSWORD:-secure_pulse_db_password}@postgres:5432/pulse
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      # Optional: mount local dev code directly if desired instead of build
      # - ./pulse:/app
      - /app/node_modules

  # -----------------------------------------------------------------
  # Next.js Dashboard (Frontend Admin Panel)
  # -----------------------------------------------------------------
  pulse-dashboard:
    build:
      context: .
      dockerfile: ./dashboard/Dockerfile
    container_name: pulse-dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://pulseadmin:${POSTGRES_PASSWORD:-secure_pulse_db_password}@postgres:5432/pulse
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-d009088af6421528620ba012a6cb8f1e626bb3f9052731c3606a38575083fc3c}
      # The dashboard doesn't need Anthropic/OpenAI keys as it uses Global Settings DB Configs

volumes:
  pulse-db-data:
  pulse-redis-data:
