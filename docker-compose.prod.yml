# Production overrides for pulse.runstate.mu
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  pulse-gateway:
    ports:
      - "8082:8080"    # Avoids conflicts with other services on VPS

  pulse-dashboard:
    ports:
      - "3003:3000"    # Avoids runstate-web (3000) and postOrbit (3002)
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://pulseadmin:${POSTGRES_PASSWORD}@postgres:5432/pulse
      - NEXTAUTH_URL=https://pulse.runstate.mu
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - WORKSPACE_BASE_DIR=/app/data/workspaces
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AUTH_TRUST_HOST=true
